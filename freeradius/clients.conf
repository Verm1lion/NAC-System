# ============================================
# FreeRADIUS Client Tanimlari
# ============================================
# Buraya RADIUS sunucusuna istek gonderecek
# cihazlari (NAS) tanimliyoruz.
#
# Docker ortaminda tum servisler ayni network'te
# oldugu icin genis bir IP araligi tanimliyoruz.
# ============================================

# Docker network'undeki tum cihazlar
client docker-network {
    ipaddr = 172.16.0.0/12
    secret = testing123
    shortname = docker
}

# Localhost (radtest icin)
client localhost {
    ipaddr = 127.0.0.1
    secret = testing123
    shortname = localhost
}
